<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<style>
    body {
        font-family: 'Montserrat', sans-serif;
    }

    .picture img {
        width: 50%;
    }

    .about,
    .cv {
        font-weight: 500;
        border-right: solid 1px #000;
    }

    .navbutton {
        cursor: pointer;
    }

    @media only screen and (max-width: 768px) {
        .picture img {
            width: 100%;
        }
    }
</style>

<body>

    <div class="container my-5">
        <div class="row">

            <!-- left side column -->
            <div class="col-12 col-md-4">
                <div class="card shadow rounded-5 mt-5">
                    <div class="d-flex flex-column p-5">
                        <div class="picture text-center my-3">
                            <img src="img/me.jpg" alt="myPic" class="shadow rounded-5">
                        </div>
                        <div class="bio mx-2">
                            <div class="h4 name text-center mb-5">
                                Maximo David G. Ortiz, Jr.
                            </div>
                            <div class="email mx-2 mb-4">
                                <div class="h6">
                                    <b>EMAIL</b>
                                </div>
                                <div class="h6">
                                    davidgortizjr@gmail.com
                                </div>
                            </div>

                            <div class="PHONE mx-2 mb-4">
                                <div class="h6">
                                    <b>PHONE</b>
                                </div>
                                <div class="h6">
                                    To be discussed
                                </div>
                            </div>

                            <div class="LOCATION mx-2 mb-4">
                                <div class="h6">
                                    <b>LOCATION</b>
                                </div>
                                <div class="h6">
                                    Sto. Tomas, Batangas
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- right side column with js mvc -->
            <div class="col-12 col-md-8">
                <div class="card shadow rounded-5 mt-5">
                    <div class="d-flex flex-row justify-content-end position-sticky top-0">
                        <div class="d-flex flex-row justify-content-between py-3 shadow rounded-5">
                            <div class="about navbutton px-3" onclick="loadPage('about')">
                                About
                            </div>
                            <div class="cv navbutton px-3" onclick="loadPage('cv')">
                                CV
                            </div>
                            <div class="portfolio navbutton px-3" onclick="loadPage('portfolio')">
                                Portfolio
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>
    <script src="js/loadPage.js"></script>
    <script>
        loadPage();
    </script>
</body>

</html>
